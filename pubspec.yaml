name: finflow
description: "FinFlow — personal finance manager for Indian users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.6.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # UI & charts
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  lottie: ^3.3.0
  flutter_svg: ^2.0.16

  # Biometric (fallback / reference — primary path is the MethodChannel bridge)
  local_auth: ^2.3.0

  # Export
  pdf: ^3.11.1
  printing: ^5.13.4
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/icons/

  # DM Sans is loaded via google_fonts at runtime, so no font registration needed.
